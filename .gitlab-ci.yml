stages:
  - test
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

check_code:
  stage: test
  tags:
    - nodejs
  script:
    - echo "Mengecek kodingan..."
    - npm ci  # Pakai 'ci' biar lebih cepat di runner
    - npm test || echo "Skip"
  only:
    - main

deploy_to_aapanel:
  stage: deploy
  tags:
    - nodejs
  script:
    - echo "Kirim ke aaPanel..."
    - rsync -avz --delete --exclude '.git' --exclude 'node_modules' ./ root@192.168.1.157:/www/wwwroot/gameforsmartNewUI/
    - ssh -o StrictHostKeyChecking=no root@192.168.1.157 "
        cd /www/wwwroot/gameforsmartNewUI && 
        npm install --production && 
        npm run build && 
        pm2 startOrReload ecosystem.config.js --update-env && 
        echo 'Deploy Sukses!'
      "
  only:
    - main  # Pastikan branch-nya sama (tadi kamu tulis master, sekarang saya samain ke main)